name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          flake8 src/ scripts/ \
            --max-line-length=100 \
            --exclude=__pycache__ \
            --ignore=E501,W503 \
            --count

      - name: Verify src package imports
        run: python -c "import src"

      - name: Generate sample data and verify dataset
        run: |
          python scripts/generate_sample_data.py
          python scripts/verify_dataset.py
